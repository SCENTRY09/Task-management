version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: Shivam
      POSTGRES_PASSWORD: Shivam
      POSTGRES_DB: task_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Shivam -d taskDB"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: adminer
    restart: unless-stopped

    depends_on:
      - postgres

    ports:
      - "8080:8080"

volumes:
  postgres_data: